services:
  mysql:
    image: mysql:8.0
    container_name: hwadee-fsc-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hwadee_fsc
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hwadee-fsc-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      FLASK_ENV: production
      APP_SECRET_KEY: hwadee-fsc-change-me
      JWT_SECRET_KEY: hwadee-fsc-jwt-change-me
      DATABASE_URL: mysql+pymysql://root:root@mysql:3306/hwadee_fsc?charset=utf8mb4
      AUTO_INIT_DB: "true"
    ports:
      - "8080:8080"

volumes:
  mysql_data:
